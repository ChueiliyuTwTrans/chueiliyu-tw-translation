        <div class="control-group barrage-control">

            <input type="range" id="barrage-size-slider" min="16" max="60" value="24" oninput="updateBarrageSize(this.value)">
        </div>

        <div class="control-group barrage-control">
            <span>範圍</span>

            <span id="height-val">40%</span>
        </div>

        <div class="control-group barrage-control">
            <span>速度</span>
            <input type="range" id="barrage-speed-slider" min="3" max="10" step="1" value="5" oninput="updateBarrageSpeed(this.value)">
        </div>

        <div class="control-group">
            <button class="sub-btn" onclick="changeSubtitleSize(-0.1)">A−</button>

        <button onclick="jumpToLiyu()">立于出場時間</button>

<h2>20251216傾聽電台</h2>

        <button class="time-btn" onclick="jumpToTime(5420)">跳轉三</button>

<div id="video-wrapper">

    <button id="emoji-trigger-btn" onclick="toggleEmojiDrawer(event)">😊</button>

    <button id="exit-fs-btn" title="退出全螢幕" style="display: none; opacity: 0;">

            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>

    </button>
</div>

<div class="reaction-section">

<script>
/* 影片ID和SRT文件 */
const MY_VIDEO_ID = "M143wrX_WHQ";

/* 設定立于出場時間：1小時2分12秒 = 3732秒 */
const MY_VIDEO_START = 3732; 

/* ===== 字幕大小設定 ===== */
function changeSubtitleSize(delta) {
        if (typeof coreChangeSubtitleSize === "function") coreChangeSubtitleSize(delta);
}

/* 跳轉時間 */
function jumpToTime(seconds) {
    // 檢查 player 物件是否存在，且是否有 seekTo 這個方法
    if (typeof player !== 'undefined' && player.seekTo) {
        player.seekTo(seconds, true);
        
        // 跳轉後自動播放影片
        player.playVideo(); 
    } else {
        console.error("YouTube 播放器尚未準備就緒或未正確定義。");
    }
}
</script>
