<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <link rel="stylesheet" href="../css/guestbook.css">
  <title>全部留言</title>

  <style>
    body { font-family: "PingFang TC", sans-serif; background-color: #f9f7f5; padding: 20px; }
    .header-nav { margin-bottom: 30px; text-align: center; }
    .section-title { font-size: 1.5em; font-weight: 700; margin: 20px 0; border-left: 5px solid #a89080; padding-left: 10px; }
    .controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px; align-items: center; }
  </style>
</head>

<body class="font-size-small"> <div class="header-nav">
    <h1>📋 全部留言</h1>
    <a href="../index.html" style="color: #a89080; text-decoration: none; font-weight: bold;">← 回到首頁</a>
  </div>

  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋關鍵字...">
    <button id="sort-btn" class="sort-btn">排序：新 → 舊</button>
    <button class="font-toggle-btn" onclick="cycleFontSize()">字體：切換大小</button>
  </div>

  <div id="guestbook-container" class="gb-grid-layout">
    <p>載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initGuestbook } from "../js/guestbook.js";
    initGuestbook('full');

    // 字體切換邏輯
    const sizes = ['font-size-small', 'font-size-medium', 'font-size-large'];
    let currentIdx = 0;
    window.cycleFontSize = () => {
        document.body.classList.remove(...sizes);
        currentIdx = (currentIdx + 1) % sizes.length;
        document.body.classList.add(sizes[currentIdx]);
    };
  </script>
</body>
</html>
