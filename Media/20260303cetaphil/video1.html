<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>舒特膚與肌膚清透滲入 映襯出立于獨有的清爽感</title>

<link rel="stylesheet" href="/chueiliyu-tw-translation/css/reaction.css">

<style>
  /* 🌟 終極彈性排版魔法：不釘死，讓它自然填滿！ */
  html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: #000 !important;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column; /* 讓控制列和影片上下排列 */
  }

  /* 上方控制列 */
  #controls {
      width: 100%;
      height: 50px;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0; /* 防止它被壓縮 */
      margin: 0;
  }

  /* 下方影片區塊，自動填滿剩餘所有空間 */
  #video-wrapper {
      position: relative;
      width: 100% !important;
      flex-grow: 1; /* 🌟 這是滿版的關鍵：把剩下的空間全部佔走！ */
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      background-color: #000 !important;
  }

  /* YouTube 播放器 100% 貼合 Wrapper */
  #player {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
  }

  h2 { display: none !important; }

  /* 隱藏不需要的表情與彈幕介面 */
  #barrage-toggle-btn, .barrage-control, #barrage-container, 
  #emoji-trigger-btn, #emoji-drawer, .reaction-section {
      display: none !important;
  }

  /* 微調按鈕美觀 */
  .control-row { display: flex; align-items: center; gap: 20px; }
  .control-group { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 0.95rem; }
  button { background: #333; color: white; border: 1px solid #555; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  button:hover { background: #555; }
</style>
</head>

<body>
<div id="controls">
    <div class="control-row">
        <button onclick="toggleBarrageDisplay()" id="barrage-toggle-btn">即時表情：開</button>
        <div class="control-group barrage-control">
            <span>大小</span><input type="range" id="barrage-size-slider" min="16" max="60" value="24" oninput="updateBarrageSize(this.value)">
        </div>
        <div class="control-group barrage-control">
            <span>範圍</span><input type="range" id="barrage-height-slider" min="10" max="100" value="40" oninput="updateBarrageHeight(this.value)"><span id="height-val">40%</span>
        </div>
        <div class="control-group barrage-control">
            <span>速度</span><input type="range" id="barrage-speed-slider" min="3" max="10" step="1" value="5" oninput="updateBarrageSpeed(this.value)">
        </div>
        
        <div class="control-group">
            <button class="sub-btn" onclick="changeSubtitleSize(-0.1)">A−</button>
            <span>字幕</span>
            <button class="sub-btn" onclick="changeSubtitleSize(0.1)">A＋</button>
        </div>
        <button id="fs-btn">進入全螢幕</button>
    </div>
</div>
    
<h2>舒特膚與肌膚清透滲入 映襯出立于獨有的清爽感</h2>

<div id="video-wrapper">
    <div id="player"></div>
    <div id="subtitle">字幕載入中...</div>
    
    <div id="barrage-container"></div>
    <button id="emoji-trigger-btn" onclick="toggleEmojiDrawer(event)">😊</button>
    <div id="emoji-drawer"></div>
    
    <button id="exit-fs-btn" title="退出全螢幕" style="display: none; opacity: 0; position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.5); border: none; padding: 5px; border-radius: 4px;">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2" fill="none">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>
</div>

<div class="reaction-section">
    <p id="reaction-title">覺得這部翻譯影片如何？點個表情吧！</p>
    <div class="reaction-wall"></div>
    <br>
</div>

<script>

      if (event.data === 'pauseVideo') {
          const ytIframe = document.querySelector('iframe');
