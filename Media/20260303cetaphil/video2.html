<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>皮膚美男立于愛用的舒特膚產品是?</title>

<style>
  body {
      margin: 0;
      background: #000 !important;
      color: #fff;
      font-family: Arial, "Noto Sans TC", sans-serif;
      text-align: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden; /* 防止出現多餘的捲軸 */
  }

  /* 影片外框 */
  #video-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background-color: #000;
  }

  #player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
  }

  /* 字幕與全螢幕按鈕樣式 */
  #controls {
      margin: 15px 0;
  }
  .control-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
  }
  .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
  }
  button {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
  }
  button:hover {
      background: #555;
  }
</style>
</head>

<body>
<div id="controls">
    <div class="control-row">
        <div class="control-group">
            <button class="sub-btn" onclick="changeSubtitleSize(-0.1)">A−</button>
            <span>字幕</span>
            <button class="sub-btn" onclick="changeSubtitleSize(0.1)">A＋</button>
        </div>
        <button id="fs-btn">進入全螢幕</button>
    </div>
</div>
    
<h2>皮膚美男立于愛用的舒特膚產品是?</h2>

<div id="video-wrapper">
    <div id="player"></div>
    <div id="subtitle">字幕載入中...</div>
    
    <button id="exit-fs-btn" title="退出全螢幕" style="display: none; opacity: 0; position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.5); border: none; padding: 5px; border-radius: 4px;">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2" fill="none">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>
</div>

<script>
  /* 第二部影片ID和SRT文件 */
  const MY_VIDEO_ID = "HCuShe8LqKU"; 
  const MY_SRT_FILE = "20260303cetaphil.srt";

  function changeSubtitleSize(delta) {
      if (typeof coreChangeSubtitleSize === "function") coreChangeSubtitleSize(delta);
  }
</script>

<script src="/chueiliyu-tw-translation/js/core-player.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  window.addEventListener('message', function(event) {
      if (event.data === 'pauseVideo') {
          const ytIframe = document.querySelector('iframe');
          if (ytIframe && ytIframe.contentWindow) {
              ytIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
          }
      }
  });
</script>
</body>
</html>
