<style>

      margin: 0;
      background: #000 !important;
      color: #fff;
      font-family: Arial, "Noto Sans TC", sans-serif;
      text-align: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
  }

  #video-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background-color: #000;
  }

  #player {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
  }

  #controls { margin: 15px 0; }
  .control-row { display: flex; justify-content: center; align-items: center; gap: 20px; }
  .control-group { display: flex; align-items: center; gap: 10px; }
  button { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
  button:hover { background: #555; }

  /* 🌟 終極隱形魔法：把不需要的表情與彈幕介面全部藏起來！ */
  #barrage-toggle-btn,
  .barrage-control,
  #barrage-container,
  #emoji-trigger-btn,
  #emoji-drawer,
  .reaction-section {
      display: none !important;
  }
</style>

<body>
<div id="controls">
    <div class="control-row">
        <button onclick="toggleBarrageDisplay()" id="barrage-toggle-btn">即時表情：開</button>
        <div class="control-group barrage-control">
            <span>大小</span><input type="range" id="barrage-size-slider" min="16" max="60" value="24" oninput="updateBarrageSize(this.value)">
        </div>
        <div class="control-group barrage-control">
            <span>範圍</span><input type="range" id="barrage-height-slider" min="10" max="100" value="40" oninput="updateBarrageHeight(this.value)"><span id="height-val">40%</span>
        </div>
        <div class="control-group barrage-control">
            <span>速度</span><input type="range" id="barrage-speed-slider" min="3" max="10" step="1" value="5" oninput="updateBarrageSpeed(this.value)">
        </div>
        
        <div class="control-group">
            <button class="sub-btn" onclick="changeSubtitleSize(-0.1)">A−</button>
            <span>字幕</span>
            <button class="sub-btn" onclick="changeSubtitleSize(0.1)">A＋</button>
        </div>
        <button id="fs-btn">進入全螢幕</button>
    </div>
</div>

    <button id="emoji-trigger-btn" onclick="toggleEmojiDrawer(event)">😊</button>
    <div id="emoji-drawer"></div>
    
    <button id="exit-fs-btn" title="退出全螢幕" style="display: none; opacity: 0; position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.5); border: none; padding: 5px; border-radius: 4px;">

            <line x1="6" y1="6" x2="18" y2="18"></line>

    </button>
</div>
