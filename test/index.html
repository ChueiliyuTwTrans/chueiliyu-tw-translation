<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <style>
    /* 全域背景設定為暖灰色 */
    body { 
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
      background-color: #f9f7f5; 
      padding: 20px; 
      color: #4a4a4a; 
      line-height: 1.6;
    }

    /* 區塊標題樣式 */
    .section-title { 
      font-size: 1.4em; 
      font-weight: 700; 
      margin: 30px 0 15px; 
      color: #5d5d5d; 
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* 隨機按鈕 - 暖咖啡色調 */
    .random-btn { 
      padding: 12px 24px; 
      font-size: 16px; 
      border: none; 
      border-radius: 50px; /* 圓角更顯柔和 */
      cursor: pointer; 
      background: linear-gradient(135deg, #a89080 0%, #8e735b 100%);
      color: white; 
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(142, 115, 91, 0.2);
      margin-bottom: 15px;
    }
    .random-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(142, 115, 91, 0.3);
    }

    /* 搜尋與控制區 - 白底陰影 */
    .controls { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 12px; 
      margin-bottom: 25px; 
      background: white; 
      padding: 18px; 
      border-radius: 15px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
    }
    .search-input { 
      flex: 1; 
      min-width: 200px; 
      padding: 12px; 
      border: 1px solid #e5e5e5; 
      border-radius: 8px; 
      font-size: 16px;
      outline-color: #a89080;
    }
    .sort-btn { 
      padding: 10px 20px; 
      border: 1px solid #d1d1d1; 
      border-radius: 8px; 
      cursor: pointer; 
      background: white; 
      color: #666; 
      font-size: 14px;
      transition: 0.3s;
    }
    .sort-btn:hover { background: #f5f5f5; }

    /* 隨機區塊容器 - 點狀邊框或淺灰 */
    #random-container { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
      gap: 20px; 
      margin-top: 5px;
      margin-bottom: 40px; 
      padding: 20px; 
      border-radius: 15px; 
      border: 1px dashed #dcdcdc; /* 虛線 */
    }

    /* 留言框多色系定義 (溫暖莫蘭迪色) */
    .theme-0 { --theme-color: #f8b1b1; } /* 粉紅 */
    .theme-1 { --theme-color: #fbc79a; } /* 粉橘 */
    .theme-2 { --theme-color: #a7d7c5; } /* 粉綠 */
    .theme-3 { --theme-color: #b1c1f8; } /* 粉藍 */
    .theme-4 { --theme-color: #d1b1f8; } /* 粉紫 */
    .theme-5 { --theme-color: #e8ca8a; } /* 淺金 */

    .message-card { 
      padding: 20px; 
      background: white; 
      border-radius: 15px; 
      border-left: 6px solid var(--theme-color); 
      box-shadow: 0 5px 15px rgba(0,0,0,0.04); 
      position: relative; 
      transition: transform 0.2s;
    }
    .message-card:hover { transform: scale(1.02); }

    .nickname { font-weight: bold; color: var(--theme-color); font-size: 1em; margin-bottom: 10px; filter: brightness(0.8); }
    .content { font-size: 15px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; color: #444; }
    
    /* 展開按鈕顏色也跟隨主題 */
    .toggle-btn { 
      background: none; 
      border: none; 
      color: var(--theme-color); 
      filter: brightness(0.7);
      cursor: pointer; 
      font-size: 13px; 
      font-weight: bold; 
      display: block; 
      margin-top: 15px; 
      margin-left: auto; 
    }

    /* 分頁樣式 */
    .pagination { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; justify-content: center; padding-bottom: 50px; }
    .page-btn { 
      padding: 10px 18px; 
      border: none; 
      background: white; 
      cursor: pointer; 
      border-radius: 8px; 
      color: #888;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .page-btn.active { 
      background: #a89080; 
      color: white; 
      box-shadow: 0 4px 10px rgba(168, 144, 128, 0.3);
    }

    hr { border: 0; border-top: 1px solid #e0e0e0; margin: 40px 0; }
  </style>
</head>

<body>

  <div class="section-title">✨ 隨機精選留言 (10則)</div>
  <button class="random-btn" id="refresh-random">再次隨機抽選留言</button>
  
  <div id="random-container">
    <p>隨機挑選中...</p>
  </div>

  <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 30px 0;">

  <div class="section-title">📋 顯示全部留言</div>
  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋留言關鍵字...">
    <button id="sort-btn" class="sort-btn">目前排序：新 → 舊</button>
  </div>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">資料載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
      authDomain: "chueiliyu-tw-translation.firebaseapp.com",
      databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chueiliyu-tw-translation",
      storageBucket: "chueiliyu-tw-translation.appspot.com",
      messagingSenderId: "625769420546",
      appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
      measurementId: "G-3PM3GTXPHF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let rawMessages = []; 
    let filteredMessages = []; 
    let isDescending = true; 
    const itemsPerPage = 100;
    const charLimit = 100;

    const container = document.getElementById('guestbook-container');
    const randomContainer = document.getElementById('random-container');
    const paginationBox = document.getElementById('pagination-controls');
    const searchInput = document.getElementById('search-input');
    const sortBtn = document.getElementById('sort-btn');
    const refreshRandomBtn = document.getElementById('refresh-random');

    onValue(ref(db, 'test'), (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        container.innerHTML = '尚無留言資料。';
        return;
      }
      rawMessages = (data.message ? [data] : Object.values(data)).filter(m => m && m.message);
      
      applyFilters(); 
      displayRandom(); 
    });

    function displayRandom() {
      randomContainer.innerHTML = '';
      const shuffled = [...rawMessages].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 10);

      selected.forEach((item, idx) => {
        const div = createMessageCard(item, true, 'rand-' + idx, idx); 
        randomContainer.appendChild(div);
      });
    }

    function applyFilters() {
      const keyword = searchInput.value.toLowerCase();
      let result = rawMessages.filter(item => 
        item.message.toLowerCase().includes(keyword)
      );

      if (isDescending) {
        result = [...result].reverse();
      }

      filteredMessages = result;
      renderPage(1);
    }

    function renderPage(page) {
      container.innerHTML = '';
      const start = (page - 1) * itemsPerPage;
      const pagedData = filteredMessages.slice(start, start + itemsPerPage);

      if (pagedData.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px; color:#999;">沒有找到符合的留言。</p>';
        paginationBox.innerHTML = '';
        return;
      }

      pagedData.forEach((item, idx) => {
        container.appendChild(createMessageCard(item, true, 'all-' + idx, idx));
      });

      renderPagination(page);
    }

    // --- 加入 colorIndex 讓顏色循環 ---
    function createMessageCard(item, allowFold, uniqueId, colorIndex) {
      const card = document.createElement('div');
      // 使用餘數運算確保主題類名在 theme-0 到 theme-5 之間循環
      const themeNum = colorIndex % 6;
      card.className = `message-card theme-${themeNum}`;
      
      const isLong = allowFold && item.message.length > charLimit;
      const shortText = isLong ? item.message.substring(0, charLimit) + "..." : item.message;

      card.innerHTML = `
        <div class="nickname">${item.nickname || '匿名'}</div>
        <div class="content" id="text-${uniqueId}">${shortText}</div>
        ${isLong ? `<button class="toggle-btn" id="btn-${uniqueId}">顯示更多</button>` : ''}
      `;

      if (isLong) {
        setTimeout(() => {
          const btn = document.getElementById(`btn-${uniqueId}`);
          const contentDiv = document.getElementById(`text-${uniqueId}`);
          let expanded = false;
          if (btn) {
            btn.onclick = () => {
              expanded = !expanded;
              contentDiv.innerText = expanded ? item.message : shortText;
              btn.innerText = expanded ? '收起' : '顯示更多';
            };
          }
        }, 0);
      }
      return card;
    }

    function renderPagination(current) {
      paginationBox.innerHTML = '';
      const totalPages = Math.ceil(filteredMessages.length / itemsPerPage);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => {
          renderPage(i);
          window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
        };
        paginationBox.appendChild(btn);
      }
    }

    searchInput.oninput = () => applyFilters();
    
    sortBtn.onclick = () => {
      isDescending = !isDescending;
      sortBtn.innerText = isDescending ? '目前排序：新 → 舊' : '目前排序：舊 → 新';
      applyFilters();
    };

    refreshRandomBtn.onclick = () => displayRandom();
  </script>
</body>
</html>
