<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">留言讀取中...</p>
  </div>

  <script>
  window.addEventListener('load', () => {
    const container = document.getElementById('guestbook-container');
    
    if (!window.db) return;

    const testRef = window.fb_ref(window.db, 'test');

    window.fb_onValue(testRef, (snapshot) => {
      const data = snapshot.val();
      container.innerHTML = '';

      if (!data) {
        container.innerHTML = '<p>尚無留言資料。</p>';
        return;
      }

      // --- 核心修正：判斷資料結構 ---
      let messages = [];

      // 如果 data 直接包含 message，代表是「單筆留言」結構
      if (data.message) {
        messages = [data]; 
      } else {
        // 如果 data 下面還有子節點，代表是「多筆留言」結構
        messages = Object.values(data);
      }

      // 渲染畫面
      messages.forEach(item => {
        // 確保至少有內容才顯示
        if (item.message) {
          const messageBox = document.createElement('div');
          messageBox.style.cssText = `
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            border-left: 4px solid #60a5fa;
          `;

          messageBox.innerHTML = `
            <div style="font-weight: bold; font-size: 0.9em; color: #444;">
              ${item.nickname || '匿名網友'}
            </div>
            <div style="margin-top: 5px; color: #222;">
              ${item.message}
            </div>
          `;
          container.prepend(messageBox);
        }
      });
    });
  });
</script>
</html>
