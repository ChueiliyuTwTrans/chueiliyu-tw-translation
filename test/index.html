<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <style>
    body { 
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
      background-color: #f9f7f5; 
      padding: 15px; 
      color: #4a4a4a; 
    }

    /* --- 最頂端切換區 --- */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(249, 247, 245, 0.9);
      backdrop-filter: blur(10px);
      padding: 10px 0;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid #eee;
    }

    .layout-switcher {
      display: flex;
      background: #e5e5e5;
      padding: 4px;
      border-radius: 12px;
      gap: 2px;
    }

    .switch-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      background: transparent;
      color: #666;
      font-weight: bold;
      transition: 0.3s;
    }

    .switch-btn.active {
      background: white;
      color: #a89080;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .section-title { 
      font-size: 1.3em; 
      font-weight: 700; 
      margin: 20px 0 15px; 
      color: #5d5d5d; 
      border-left: 5px solid #a89080;
      padding-left: 10px;
    }

    /* --- 真實便利貼紙張特效 --- */
    #random-container {
      perspective: 2000px;
    }

    /* 階段一：20秒開始的慢慢捲起 (Curling) */
    .curling {
      animation: paperCurl 10s forwards linear;
      transform-origin: top;
    }

    @keyframes paperCurl {
      0% { transform: rotateX(0deg) skewX(0deg); border-bottom-right-radius: 2px; }
      30% { transform: rotateX(5deg) skewX(1deg); border-bottom-right-radius: 20px; }
      60% { transform: rotateX(15deg) skewX(2deg); border-bottom-right-radius: 50px; }
      100% { transform: rotateX(25deg) skewX(3deg); border-bottom-right-radius: 80px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    }

    /* 階段二：30秒一到的猝不及防撕掉 */
    .peel-off-fast {
      animation: realPeel 0.6s forwards ease-in;
      transform-origin: top;
    }

    @keyframes realPeel {
      0% { transform: rotateX(25deg) skewX(3deg); opacity: 1; }
      100% { transform: rotateX(120deg) translateY(-100px) skewX(10deg); opacity: 0; }
    }

    /* 階段三：貼上新的便利貼 (帶有紙張回彈感) */
    .stick-on-soft {
      animation: realStick 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: top;
    }

    @keyframes realStick {
      0% { transform: rotateX(-100deg); opacity: 0; }
      50% { transform: rotateX(20deg); opacity: 1; }
      75% { transform: rotateX(-10deg); }
      100% { transform: rotateX(0deg); opacity: 1; }
    }

    /* --- 基礎卡片樣式 --- */
    .message-card { 
      padding: 20px; background: #fffdf2; /* 稍微帶點便利貼黃 */
      border-radius: 2px;
      border-left: 6px solid var(--theme-color); 
      box-shadow: 2px 2px 5px rgba(0,0,0,0.05); 
      box-sizing: border-box;
      backface-visibility: hidden;
      position: relative;
      transition: box-shadow 0.3s;
    }

    .theme-0 { --theme-color: #f8b1b1; }
    .theme-1 { --theme-color: #fbc79a; }
    .theme-2 { --theme-color: #a7d7c5; }
    .theme-3 { --theme-color: #b1c1f8; }
    .theme-4 { --theme-color: #d1b1f8; }
    .theme-5 { --theme-color: #e8ca8a; }

    .nickname { font-weight: bold; color: var(--theme-color); filter: brightness(0.8); margin-bottom: 5px; }
    .content { line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #444; }
    .toggle-btn { background: none; border: none; color: var(--theme-color); filter: brightness(0.7); cursor: pointer; font-size: 12px; font-weight: bold; display: block; margin-top: 10px; margin-left: auto; }

    /* 按鈕 */
    .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .random-btn, .pause-btn { padding: 10px 20px; border: none; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
    .random-btn { background: linear-gradient(135deg, #a89080 0%, #8e735b 100%); }
    .pause-btn { background: #666; }
    .pause-btn.active { background: #d9534f; }

    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .search-input { flex: 1; min-width: 150px; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 15px; }
    .sort-btn { padding: 8px 15px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .pagination { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; justify-content: center; padding-bottom: 50px; }
    .page-btn { padding: 8px 14px; border: none; background: white; cursor: pointer; border-radius: 8px; color: #888; }
    .page-btn.active { background: #a89080; color: white; }
    hr { border: 0; border-top: 1px solid #eee; margin: 40px 0; }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="layout-switcher">
      <button class="switch-btn active" id="btn-grid">留言牆</button>
      <button class="switch-btn" id="btn-list">留言清單</button>
    </div>
  </div>

  <div class="section-title">✨ 應援留言 (30秒更新，剩餘10秒開始捲動)</div>
  <div class="btn-group">
    <button class="random-btn" id="refresh-random">再次隨機抽選</button>
    <button class="pause-btn" id="pause-auto">暫停自動更新</button>
  </div>

  <div id="random-container" class="grid-layout">
    <p>佈置中...</p>
  </div>

  <hr>

  <div class="section-title">📋 全部留言清單</div>
  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋關鍵字...">
    <button id="sort-btn" class="sort-btn">排序：新 → 舊</button>
  </div>

  <div id="guestbook-container" class="grid-layout">
    <p id="loading-text">載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
      authDomain: "chueiliyu-tw-translation.firebaseapp.com",
      databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chueiliyu-tw-translation",
      storageBucket: "chueiliyu-tw-translation.appspot.com",
      messagingSenderId: "625769420546",
      appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
      measurementId: "G-3PM3GTXPHF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let rawMessages = []; 
    let filteredMessages = []; 
    let isDescending = true; 
    let isPaused = false;
    let mainTimer = null;
    let curlTimer = null;

    const randomContainer = document.getElementById('random-container');
    const container = document.getElementById('guestbook-container');
    const paginationBox = document.getElementById('pagination-controls');
    const searchInput = document.getElementById('search-input');
    const sortBtn = document.getElementById('sort-btn');
    const pauseBtn = document.getElementById('pause-auto');
    const btnGrid = document.getElementById('btn-grid');
    const btnList = document.getElementById('btn-list');

    onValue(ref(db, 'test'), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      rawMessages = (data.message ? [data] : Object.values(data)).filter(m => m && m.message);
      applyFilters(); 
      resetAutoSlide(); 
    });

    // --- 自動循環邏輯 ---
    function resetAutoSlide() {
      clearInterval(mainTimer);
      clearTimeout(curlTimer);
      if (isPaused) return;

      displayRandom(false);

      // 第 20 秒時，觸發慢慢捲起動畫
      curlTimer = setTimeout(() => {
        const cards = randomContainer.querySelectorAll('.message-card');
        cards.forEach((card, idx) => {
          setTimeout(() => {
            card.classList.add('curling');
          }, idx * 200); // 每個卡片交錯開始捲起
        });
      }, 20000);

      // 第 30 秒時，觸發快速撕掉並更新
      mainTimer = setInterval(() => {
        executePeelTransition();
      }, 30000);
    }

    function executePeelTransition() {
      const cards = randomContainer.querySelectorAll('.message-card');
      if (cards.length === 0) { displayRandom(true); return; }

      cards.forEach((card, idx) => {
        setTimeout(() => {
          card.classList.remove('curling');
          card.classList.add('peel-off-fast');
        }, idx * 80);
      });

      // 撕完後重新佈置
      setTimeout(() => {
        displayRandom(true);
        // 重新排定下一次的 20 秒捲動
        clearTimeout(curlTimer);
        curlTimer = setTimeout(() => {
          const newCards = randomContainer.querySelectorAll('.message-card');
          newCards.forEach((c, i) => setTimeout(() => c.classList.add('curling'), i * 200));
        }, 20000);
      }, (cards.length * 80) + 600);
    }

    function displayRandom(animateIn = false) {
      randomContainer.innerHTML = '';
      const shuffled = [...rawMessages].sort(() => 0.5 - Math.random()).slice(0, 10);
      shuffled.forEach((item, idx) => {
        const card = createMessageCard(item, true, 'rand-' + idx, idx);
        if (animateIn) {
          card.style.opacity = '0';
          card.classList.add('stick-on-soft');
          card.style.animationDelay = `${idx * 0.1}s`;
        }
        randomContainer.appendChild(card);
      });
    }

    // --- 按鈕事件 ---
    pauseBtn.onclick = () => {
      isPaused = !isPaused;
      pauseBtn.innerText = isPaused ? '再次自動更新' : '暫停自動更新';
      pauseBtn.classList.toggle('active', isPaused);
      if (isPaused) {
        clearInterval(mainTimer);
        clearTimeout(curlTimer);
        const cards = randomContainer.querySelectorAll('.message-card');
        cards.forEach(c => c.classList.remove('curling'));
      } else {
        executePeelTransition();
        resetAutoSlide();
      }
    };

    document.getElementById('refresh-random').onclick = () => {
      executePeelTransition();
      if (!isPaused) resetAutoSlide();
    };

    // --- 基礎渲染邏輯 (維持站長原本的功能) ---
    function updateLayout(layout) {
      randomContainer.className = layout;
      container.className = layout;
      btnGrid.classList.toggle('active', layout === 'grid-layout');
      btnList.classList.toggle('active', layout === 'list-layout');
      renderPage(1);
    }
    btnGrid.onclick = () => updateLayout('grid-layout');
    btnList.onclick = () => updateLayout('list-layout');

    function applyFilters() {
      const kw = searchInput.value.toLowerCase();
      filteredMessages = rawMessages.filter(m => m.message.toLowerCase().includes(kw));
      if (isDescending) filteredMessages.reverse();
      renderPage(1);
    }

    function renderPage(page) {
      container.innerHTML = '';
      const start = (page - 1) * 100;
      filteredMessages.slice(start, start + 100).forEach((item, idx) => {
        container.appendChild(createMessageCard(item, true, 'all-' + idx, idx));
      });
      renderPagination(page);
    }

    function createMessageCard(item, allowFold, uniqueId, colorIndex) {
      const card = document.createElement('div');
      card.className = `message-card theme-${colorIndex % 6}`;
      const shortText = item.message.length > 100 ? item.message.substring(0, 100) + "..." : item.message;
      card.innerHTML = `
        <div class="nickname">${item.nickname || '匿名'}</div>
        <div class="content" id="text-${uniqueId}">${shortText}</div>
        ${item.message.length > 100 ? `<button class="toggle-btn" id="btn-${uniqueId}">展開</button>` : ''}
      `;
      if (item.message.length > 100) {
        setTimeout(() => {
          const btn = document.getElementById(`btn-${uniqueId}`);
          if (btn) btn.onclick = (e) => {
            e.stopPropagation();
            const div = document.getElementById(`text-${uniqueId}`);
            const isExp = btn.innerText === '展開';
            div.innerText = isExp ? item.message : shortText;
            btn.innerText = isExp ? '收起' : '展開';
          };
        }, 0);
      }
      return card;
    }

    function renderPagination(current) {
      paginationBox.innerHTML = '';
      const total = Math.ceil(filteredMessages.length / 100);
      if (total <= 1) return;
      for (let i = 1; i <= total; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => { renderPage(i); window.scrollTo({top: container.offsetTop - 150, behavior: 'smooth'}); };
        paginationBox.appendChild(btn);
      }
    }

    searchInput.oninput = () => applyFilters();
    sortBtn.onclick = () => {
      isDescending = !isDescending;
      sortBtn.innerText = isDescending ? '排序：新 → 舊' : '排序：舊 → 新';
      applyFilters();
    };

  </script>
</body>
</html>
