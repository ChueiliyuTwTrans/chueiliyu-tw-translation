<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">留言讀取中...</p>
  </div>

  <script>
  // 確保 Firebase 已經初始化完成後執行
  window.addEventListener('load', () => {
    const container = document.getElementById('guestbook-container');
    const loadingText = document.getElementById('loading-text');

    // 1. 設定指向 Realtime Database 中的 "test" 節點
    const testRef = window.fb_ref(window.db, 'test');

    // 2. 使用 onValue 實時監聽資料變動
    window.fb_onValue(testRef, (snapshot) => {
      const data = snapshot.val();
      
      // 清空容器
      container.innerHTML = '';

      if (!data) {
        container.innerHTML = '<p>目前尚無留言。</p>';
        return;
      }

      // 3. 處理資料 (假設資料是以物件形式存放，例如推送到 Firebase 的亂碼 ID)
      // 如果你的資料是陣列，Object.values 一樣適用
      const messages = Object.values(data);

      // 4. 渲染每一筆留言 (只顯示 nickname 和 message)
      messages.forEach(item => {
        const messageBox = document.createElement('div');
        
        // 這裡可以根據你的 CSS 調整樣式
        messageBox.style.padding = '12px';
        messageBox.style.borderBottom = '1px solid #eee';
        messageBox.style.background = 'rgba(255, 255, 255, 0.5)';
        messageBox.style.borderRadius = '8px';

        messageBox.innerHTML = `
          <div style="font-weight: bold; color: var(--primary-color, #60a5fa); margin-bottom: 5px;">
            ${item.nickname || '匿名網友'}
          </div>
          <div style="font-size: 14px; line-height: 1.5;">
            ${item.message}
          </div>
        `;
        
        // 最新的留言放在最上面
        container.prepend(messageBox);
      });
    }, (error) => {
      console.error("讀取失敗:", error);
      container.innerHTML = '<p>留言讀取失敗，請稍後再試。</p>';
    });
  });
  </script>
</html>
