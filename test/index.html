<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <style>
    body { 
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
      background-color: #f9f7f5; 
      padding: 15px; 
      color: #4a4a4a; 
    }

    /* --- 最頂端切換區 --- */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(249, 247, 245, 0.9);
      backdrop-filter: blur(10px);
      padding: 10px 0;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid #eee;
    }

    .layout-switcher {
      display: flex;
      background: #e5e5e5;
      padding: 4px;
      border-radius: 12px;
      gap: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .switch-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      background: transparent;
      color: #666;
      font-weight: bold;
      transition: 0.3s;
    }

    .switch-btn.active {
      background: white;
      color: #a89080;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .section-title { 
      font-size: 1.3em; 
      font-weight: 700; 
      margin: 20px 0 15px; 
      color: #5d5d5d; 
      border-left: 5px solid #a89080;
      padding-left: 10px;
    }

    /* --- 便利貼紙張特效 --- */
    #random-container {
      perspective: 1200px; /* 增加 3D 深度 */
    }

    /* 撕除動畫：放慢速度，先翹起一角再撕掉 */
    .peel-off-slow {
      animation: slowRealPeel 0.8s forwards ease-in;
      transform-origin: top center;
      pointer-events: none;
    }

    @keyframes slowRealPeel {
      0% { 
        transform: rotateX(0deg) translateY(0); 
        opacity: 1; 
        border-bottom-right-radius: 12px; 
      }
      40% { 
        /* 撕除前先微微翹起右下角 */
        transform: rotateX(15deg) rotateY(-8deg) translateY(-2px) skewX(2deg); 
        border-bottom-right-radius: 50px; 
        box-shadow: -5px 15px 20px rgba(0,0,0,0.1); 
        opacity: 1;
      }
      100% { 
        transform: rotateX(90deg) translateY(-80px) skewX(10deg); 
        opacity: 0; 
      }
    }

    /* 貼上動畫：像紙張一樣從捲曲狀態慢慢鋪平 (Unroll) */
    .stick-on-unroll {
      animation: paperUnroll 1.1s forwards cubic-bezier(0.25, 0.8, 0.25, 1);
      transform-origin: top center;
    }

    @keyframes paperUnroll {
      0% {
        transform: rotateX(-70deg) translateY(40px);
        opacity: 0;
        /* 剛貼上時底部是捲起來的 */
        border-bottom-left-radius: 100px;
        border-bottom-right-radius: 100px;
        box-shadow: 0 30px 20px rgba(0,0,0,0.15);
      }
      60% {
        transform: rotateX(5deg) translateY(0);
        opacity: 1;
        /* 紙張快要貼平 */
        border-bottom-left-radius: 25px;
        border-bottom-right-radius: 25px;
        box-shadow: 0 5px 10px rgba(0,0,0,0.05);
      }
      100% {
        transform: rotateX(0deg);
        opacity: 1;
        /* 完全貼平，恢復正常圓潤角 */
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.06);
      }
    }

    /* --- 基礎版面與卡片佈局 --- */
    .grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .list-layout {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    @media (max-width: 600px) {
      .grid-layout { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .grid-layout .message-card { padding: 12px; aspect-ratio: 1 / 1; display: flex; flex-direction: column; overflow: hidden; }
      .grid-layout .content { font-size: 13px; line-height: 1.4; overflow-y: auto; flex-grow: 1; }
      .grid-layout .toggle-btn { display: none; }
    }

    .message-card { 
      padding: 20px; 
      background: #ffffff; /* 純白背景 */
      border-radius: 12px; /* 增加圓潤度 */
      border-left: 6px solid var(--theme-color); 
      box-shadow: 2px 2px 8px rgba(0,0,0,0.06); 
      box-sizing: border-box;
      backface-visibility: hidden;
      position: relative;
      overflow: hidden; /* 確保內容不會超出圓角 */
    }

    .theme-0 { --theme-color: #f8b1b1; }
    .theme-1 { --theme-color: #fbc79a; }
    .theme-2 { --theme-color: #a7d7c5; }
    .theme-3 { --theme-color: #b1c1f8; }
    .theme-4 { --theme-color: #d1b1f8; }
    .theme-5 { --theme-color: #e8ca8a; }

    .nickname { font-weight: bold; color: var(--theme-color); filter: brightness(0.8); margin-bottom: 5px; }
    .content { line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #444; }
    .toggle-btn { background: none; border: none; color: var(--theme-color); filter: brightness(0.7); cursor: pointer; font-size: 12px; font-weight: bold; display: block; margin-top: 10px; margin-left: auto; }

    /* 按鈕樣式 */
    .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .random-btn { 
      padding: 10px 22px; border: none; border-radius: 50px; cursor: pointer; 
      color: white; font-weight: bold; transition: 0.3s; font-size: 14px;
      background: linear-gradient(135deg, #a89080 0%, #8e735b 100%); 
    }

    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .search-input { flex: 1; min-width: 150px; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 15px; }
    .sort-btn { padding: 8px 15px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .pagination { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; justify-content: center; padding-bottom: 50px; }
    .page-btn { padding: 8px 14px; border: none; background: white; cursor: pointer; border-radius: 8px; color: #888; }
    .page-btn.active { background: #a89080; color: white; }
    hr { border: 0; border-top: 1px solid #eee; margin: 40px 0; }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="layout-switcher">
      <button class="switch-btn active" id="btn-grid">留言牆</button>
      <button class="switch-btn" id="btn-list">留言清單</button>
    </div>
  </div>

  <div class="section-title">✨ 隨機抽選留言</div>
  <div class="btn-group">
    <button class="random-btn" id="refresh-random">再次隨機抽選留言</button>
  </div>

  <div id="random-container" class="grid-layout">
    <p>載入中...</p> 
  </div>

  <hr>

  <div class="section-title">📋 顯示全部留言</div>
  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋關鍵字...">
    <button id="sort-btn" class="sort-btn">排序：新 → 舊</button>
  </div>

  <div id="guestbook-container" class="grid-layout">
    <p id="loading-text">載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
      authDomain: "chueiliyu-tw-translation.firebaseapp.com",
      databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chueiliyu-tw-translation",
      storageBucket: "chueiliyu-tw-translation.appspot.com",
      messagingSenderId: "625769420546",
      appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
      measurementId: "G-3PM3GTXPHF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let rawMessages = []; 
    let filteredMessages = []; 
    let isDescending = true; 
    let initialLoaded = false;
    let isAnimating = false; // 防止連續點擊按鈕造成動畫重疊

    const randomContainer = document.getElementById('random-container');
    const container = document.getElementById('guestbook-container');
    const paginationBox = document.getElementById('pagination-controls');
    const searchInput = document.getElementById('search-input');
    const sortBtn = document.getElementById('sort-btn');
    const btnGrid = document.getElementById('btn-grid');
    const btnList = document.getElementById('btn-list');

    onValue(ref(db, 'test'), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      rawMessages = (data.message ? [data] : Object.values(data)).filter(m => m && m.message);
      
      applyFilters(); 
      
      // 一抓到資料立刻顯示，只執行一次
      if (!initialLoaded) {
        initialLoaded = true;
        displayRandom(true);
      }
    });

    // --- 手動重新整理：撕下舊的，貼上新的 ---
    function refreshRandomMessages() {
      if (isAnimating) return; // 動畫執行中不允許重複點擊
      isAnimating = true;

      const cards = randomContainer.querySelectorAll('.message-card');
      if (cards.length === 0) { 
        displayRandom(true); 
        isAnimating = false;
        return; 
      }

      // 撕掉：放慢交錯時間，看起來更有次序感
      cards.forEach((card, index) => {
        setTimeout(() => {
          card.classList.add('peel-off-slow');
        }, index * 100); 
      });

      // 等所有卡片撕完後，換上新的
      setTimeout(() => {
        displayRandom(true);
        isAnimating = false;
      }, (cards.length * 100) + 800);
    }

    // 負責渲染 10 筆隨機留言
    function displayRandom(withAnimation = false) {
      randomContainer.innerHTML = '';
      const shuffled = [...rawMessages].sort(() => 0.5 - Math.random()).slice(0, 10);
      
      shuffled.forEach((item, idx) => {
        const card = createMessageCard(item, true, 'rand-' + idx, idx);
        if (withAnimation) {
          card.style.opacity = '0';
          card.classList.add('stick-on-unroll');
          // 貼上的交錯時間也稍微拉長，更有鋪陳感
          card.style.animationDelay = `${idx * 0.12}s`; 
        }
        randomContainer.appendChild(card);
      });
    }

    // --- 綁定按鈕事件 ---
    document.getElementById('refresh-random').onclick = () => {
      refreshRandomMessages();
    };

    // --- 版面渲染 (維持原本功能) ---
    function applyFilters() {
      const keyword = searchInput.value.toLowerCase();
      let result = rawMessages.filter(item => item.message.toLowerCase().includes(keyword));
      if (isDescending) result = [...result].reverse();
      filteredMessages = result;
      renderPage(1);
    }

    function renderPage(page) {
      container.innerHTML = '';
      const start = (page - 1) * 100;
      filteredMessages.slice(start, start + 100).forEach((item, idx) => {
        container.appendChild(createMessageCard(item, true, 'all-' + idx, idx));
      });
      renderPagination(page);
    }

    function createMessageCard(item, allowFold, uniqueId, colorIndex) {
      const card = document.createElement('div');
      card.className = `message-card theme-${colorIndex % 6}`;
      const shortText = item.message.length > 100 ? item.message.substring(0, 100) + "..." : item.message;
      
      card.innerHTML = `
        <div class="nickname">${item.nickname || '匿名'}</div>
        <div class="content" id="text-${uniqueId}">${shortText}</div>
        ${item.message.length > 100 ? `<button class="toggle-btn" id="btn-${uniqueId}">展開</button>` : ''}
      `;

      if (item.message.length > 100) {
        setTimeout(() => {
          const btn = document.getElementById(`btn-${uniqueId}`);
          if (btn) btn.onclick = (e) => {
            e.stopPropagation();
            const contentDiv = document.getElementById(`text-${uniqueId}`);
            const isExp = btn.innerText === '展開';
            contentDiv.innerText = isExp ? item.message : shortText;
            btn.innerText = isExp ? '收起' : '展開';
          };
        }, 0);
      }
      return card;
    }

    function renderPagination(current) {
      paginationBox.innerHTML = '';
      const total = Math.ceil(filteredMessages.length / 100);
      if (total <= 1) return;
      for (let i = 1; i <= total; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => { 
          renderPage(i); 
          window.scrollTo({top: container.offsetTop - 150, behavior: 'smooth'}); 
        };
        paginationBox.appendChild(btn);
      }
    }

    searchInput.oninput = () => applyFilters();
    sortBtn.onclick = () => {
      isDescending = !isDescending;
      sortBtn.innerText = isDescending ? '排序：新 → 舊' : '排序：舊 → 新';
      applyFilters();
    };

    btnGrid.onclick = () => {
      randomContainer.className = 'grid-layout';
      container.className = 'grid-layout';
      btnGrid.classList.add('active');
      btnList.classList.remove('active');
      renderPage(1);
    };

    btnList.onclick = () => {
      randomContainer.className = 'list-layout';
      container.className = 'list-layout';
      btnList.classList.add('active');
      btnGrid.classList.remove('active');
      renderPage(1);
    };

  </script>
</body>
</html>
