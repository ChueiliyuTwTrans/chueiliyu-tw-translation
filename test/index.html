<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">留言讀取中...</p>
  </div>

  <script type="module">
  // 1. 載入 Firebase 核心功能
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
    
  // 2. Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
    authDomain: "chueiliyu-tw-translation.firebaseapp.com",
    databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chueiliyu-tw-translation",
    storageBucket: "chueiliyu-tw-translation.appspot.com",
    messagingSenderId: "625769420546",
    appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
    measurementId: "G-3PM3GTXPHF"
  };

  // 3. 啟動連線
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);

  // 借給外部 JS 使用 (保留你原本的需求)
  window.db = db;
  window.fb_ref = ref;            
  window.fb_onValue = onValue;    
  window.fb_runTransaction = runTransaction; 

  // --- 關鍵修正：直接在這裡執行讀取邏輯 ---
  const container = document.getElementById('guestbook-container');
  if (container) {
    console.log("🚀 Firebase 模組已就緒，開始讀取留言...");
    const testRef = ref(db, 'test');

    onValue(testRef, (snapshot) => {
      const data = snapshot.val();
      console.log("📥 收到資料:", data);
      
      container.innerHTML = '';

      if (!data) {
        container.innerHTML = '<p>目前沒有留言。</p>';
        return;
      }

      // 自動判斷單筆或多筆
      let messages = data.message ? [data] : Object.values(data);

      messages.forEach(item => {
        if (item.message) {
          const div = document.createElement('div');
          div.style.cssText = `
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            border-left: 4px solid #60a5fa;
          `;
          div.innerHTML = `
            <div style="font-weight: bold; font-size: 0.85em; color: #555;">${item.nickname || '匿名'}</div>
            <div style="margin-top: 4px; color: #111;">${item.message}</div>
          `;
          container.prepend(div);
        }
      });
    }, (error) => {
      console.error("❌ 讀取失敗:", error);
      container.innerHTML = `<p>讀取出錯: ${error.message}</p>`;
    });
  }
</script>
</html>
