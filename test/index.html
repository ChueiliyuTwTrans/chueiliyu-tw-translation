<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <style>
    /* 全域美化 */
    body { 
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
      background-color: #f9f7f5; 
      padding: 20px; 
      color: #4a4a4a; 
      transition: background-color 0.3s;
    }

    .section-title { 
      font-size: 1.4em; 
      font-weight: 700; 
      margin: 30px 0 15px; 
      color: #5d5d5d; 
      display: flex;
      align-items: center;
      justify-content: space-between; /* 讓標題和切換按鈕分開 */
      flex-wrap: wrap;
    }

    /* 切換按鈕組樣式 */
    .layout-switcher {
      display: flex;
      background: #eee;
      padding: 4px;
      border-radius: 10px;
      gap: 2px;
    }
    .switch-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      background: transparent;
      color: #777;
      transition: 0.2s;
    }
    .switch-btn.active {
      background: white;
      color: #a89080;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* 隨機按鈕 */
    .random-btn { 
      padding: 10px 20px; 
      font-size: 15px; 
      border: none; 
      border-radius: 50px; 
      cursor: pointer; 
      background: linear-gradient(135deg, #a89080 0%, #8e735b 100%);
      color: white; 
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(142, 115, 91, 0.2);
    }

    /* --- 重點：版面佈局切換 --- */
    
    /* 1. 靈感牆模式 (Grid) */
    .grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    /* 2. 應援清單模式 (List) */
    .list-layout {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .list-layout .message-card {
      max-width: 800px;
      margin: 0 auto; /* 置中 */
      width: 100%;
    }

    /* 容器基本樣式 */
    #random-container {
      padding: 20px;
      border-radius: 15px;
      border: 1px dashed #dcdcdc;
      transition: all 0.4s ease;
    }

    /* 留言卡片主題配色 */
    .theme-0 { --theme-color: #f8b1b1; }
    .theme-1 { --theme-color: #fbc79a; }
    .theme-2 { --theme-color: #a7d7c5; }
    .theme-3 { --theme-color: #b1c1f8; }
    .theme-4 { --theme-color: #d1b1f8; }
    .theme-5 { --theme-color: #e8ca8a; }

    .message-card { 
      padding: 20px; 
      background: white; 
      border-radius: 15px; 
      border-left: 6px solid var(--theme-color); 
      box-shadow: 0 5px 15px rgba(0,0,0,0.04); 
      box-sizing: border-box;
    }

    .nickname { font-weight: bold; color: var(--theme-color); filter: brightness(0.8); margin-bottom: 8px; }
    .content { font-size: 15px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; color: #444; }
    .toggle-btn { background: none; border: none; color: var(--theme-color); filter: brightness(0.7); cursor: pointer; font-size: 13px; font-weight: bold; display: block; margin-top: 15px; margin-left: auto; }

    /* 其他輔助樣式 */
    .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; background: white; padding: 18px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
    .search-input { flex: 1; min-width: 200px; padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px; }
    .pagination { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; justify-content: center; padding-bottom: 50px; }
    .page-btn { padding: 10px 18px; border: none; background: white; cursor: pointer; border-radius: 8px; color: #888; }
    .page-btn.active { background: #a89080; color: white; }
    hr { border: 0; border-top: 1px solid #e0e0e0; margin: 40px 0; }
  </style>
</head>

<body>

  <div class="section-title">
    <span>✨ 精選推薦留言</span>
    <div class="layout-switcher">
      <button class="switch-btn active" id="btn-grid">靈感牆模式</button>
      <button class="switch-btn" id="btn-list">應援清單模式</button>
    </div>
  </div>

  <button class="random-btn" id="refresh-random">再次隨機抽選留言</button>
  
  <div id="random-container" class="grid-layout">
    <p>正在佈置牆面...</p>
  </div>

  <hr>

  <div class="section-title">📋 全部應援存檔</div>
  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋關鍵字...">
    <button id="sort-btn" class="switch-btn" style="background:#eee; color:#666; border-radius:8px;">目前排序：新 → 舊</button>
  </div>

  <div id="guestbook-container" class="list-layout">
    <p id="loading-text">載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
      authDomain: "chueiliyu-tw-translation.firebaseapp.com",
      databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chueiliyu-tw-translation",
      storageBucket: "chueiliyu-tw-translation.appspot.com",
      messagingSenderId: "625769420546",
      appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
      measurementId: "G-3PM3GTXPHF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let rawMessages = []; 
    let filteredMessages = []; 
    let isDescending = true; 
    const itemsPerPage = 100;
    const charLimit = 100;

    const randomContainer = document.getElementById('random-container');
    const container = document.getElementById('guestbook-container');
    const paginationBox = document.getElementById('pagination-controls');
    const searchInput = document.getElementById('search-input');
    const sortBtn = document.getElementById('sort-btn');
    const refreshRandomBtn = document.getElementById('refresh-random');

    // 版面切換按鈕
    const btnGrid = document.getElementById('btn-grid');
    const btnList = document.getElementById('btn-list');

    onValue(ref(db, 'test'), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      rawMessages = (data.message ? [data] : Object.values(data)).filter(m => m && m.message);
      applyFilters(); 
      displayRandom(); 
    });

    // 版面切換邏輯
    btnGrid.addEventListener('click', () => {
      randomContainer.className = 'grid-layout';
      btnGrid.classList.add('active');
      btnList.classList.remove('active');
    });

    btnList.addEventListener('click', () => {
      randomContainer.className = 'list-layout';
      btnList.classList.add('active');
      btnGrid.classList.remove('active');
    });

    function displayRandom() {
      randomContainer.innerHTML = '';
      const shuffled = [...rawMessages].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 10);
      selected.forEach((item, idx) => {
        randomContainer.appendChild(createMessageCard(item, true, 'rand-' + idx, idx));
      });
    }

    function applyFilters() {
      const keyword = searchInput.value.toLowerCase();
      let result = rawMessages.filter(item => item.message.toLowerCase().includes(keyword));
      if (isDescending) result = [...result].reverse();
      filteredMessages = result;
      renderPage(1);
    }

    function renderPage(page) {
      container.innerHTML = '';
      const start = (page - 1) * itemsPerPage;
      const pagedData = filteredMessages.slice(start, start + itemsPerPage);
      pagedData.forEach((item, idx) => {
        container.appendChild(createMessageCard(item, true, 'all-' + idx, idx));
      });
      renderPagination(page);
    }

    function createMessageCard(item, allowFold, uniqueId, colorIndex) {
      const card = document.createElement('div');
      card.className = `message-card theme-${colorIndex % 6}`;
      const isLong = allowFold && item.message.length > charLimit;
      const shortText = isLong ? item.message.substring(0, charLimit) + "..." : item.message;
      card.innerHTML = `
        <div class="nickname">${item.nickname || '匿名'}</div>
        <div class="content" id="text-${uniqueId}">${shortText}</div>
        ${isLong ? `<button class="toggle-btn" id="btn-${uniqueId}">顯示更多</button>` : ''}
      `;
      if (isLong) {
        setTimeout(() => {
          const btn = document.getElementById(`btn-${uniqueId}`);
          const contentDiv = document.getElementById(`text-${uniqueId}`);
          let expanded = false;
          if (btn) btn.onclick = () => {
            expanded = !expanded;
            contentDiv.innerText = expanded ? item.message : shortText;
            btn.innerText = expanded ? '收起' : '顯示更多';
          };
        }, 0);
      }
      return card;
    }

    function renderPagination(current) {
      paginationBox.innerHTML = '';
      const totalPages = Math.ceil(filteredMessages.length / itemsPerPage);
      if (totalPages <= 1) return;
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => {
          renderPage(i);
          window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
        };
        paginationBox.appendChild(btn);
      }
    }

    searchInput.oninput = () => applyFilters();
    sortBtn.onclick = () => {
      isDescending = !isDescending;
      sortBtn.innerText = isDescending ? '目前排序：新 → 舊' : '目前排序：舊 → 新';
      applyFilters();
    };
    refreshRandomBtn.onclick = () => displayRandom();
  </script>
</body>
</html>
