<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
    
    /* 區塊標題 */
    .section-title { 
      font-size: 1.3em; 
      font-weight: bold; 
      margin: 25px 0 15px; 
      color: #1e40af; 
      border-left: 5px solid #60a5fa; 
      padding-left: 10px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    /* 隨機按鈕加大並增加間距 */
    .random-btn { 
      padding: 10px 20px; 
      font-size: 16px; /* 字體加大 */
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      background: #3b82f6; 
      color: white; 
      transition: 0.3s;
      margin-bottom: 10px; /* 增加與下方內容的距離 */
    }
    .random-btn:hover { background: #2563eb; }

    /* 搜尋與控制區 */
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .search-input { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
    .sort-btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; background: #60a5fa; color: white; font-size: 14px; }

    /* 隨機區塊容器 */
    #random-container { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 15px; 
      margin-top: 10px; /* 與按鈕保持距離 */
      margin-bottom: 30px; 
      background: #e0f2fe; 
      padding: 20px; 
      border-radius: 12px; 
    }

    /* 留言框樣式 */
    .message-card { padding: 15px; background: white; border-radius: 10px; border-left: 4px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
    .nickname { font-weight: bold; color: #555; font-size: 0.95em; margin-bottom: 8px; }
    .content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #222; }
    .toggle-btn { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 13px; font-weight: bold; display: block; margin-top: 10px; margin-left: auto; }

    /* 分頁樣式 */
    .pagination { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 25px; justify-content: center; padding-bottom: 40px; }
    .page-btn { padding: 10px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 6px; }
    .page-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
  </style>
</head>

<body>

  <div class="section-title">✨ 隨機精選留言 (10則)</div>
  <button class="random-btn" id="refresh-random">再次隨機抽選留言</button>
  
  <div id="random-container">
    <p>隨機挑選中...</p>
  </div>

  <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 30px 0;">

  <div class="section-title">📋 顯示全部留言</div>
  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋留言關鍵字...">
    <button id="sort-btn" class="sort-btn">切換排序：目前為 倒序 (新→舊)</button>
  </div>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">資料載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
      authDomain: "chueiliyu-tw-translation.firebaseapp.com",
      databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chueiliyu-tw-translation",
      storageBucket: "chueiliyu-tw-translation.appspot.com",
      messagingSenderId: "625769420546",
      appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
      measurementId: "G-3PM3GTXPHF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let rawMessages = []; 
    let filteredMessages = []; 
    let isDescending = true; // 預設新到舊
    const itemsPerPage = 100;
    const charLimit = 100;

    const container = document.getElementById('guestbook-container');
    const randomContainer = document.getElementById('random-container');
    const paginationBox = document.getElementById('pagination-controls');
    const searchInput = document.getElementById('search-input');
    const sortBtn = document.getElementById('sort-btn');
    const refreshRandomBtn = document.getElementById('refresh-random');

    onValue(ref(db, 'test'), (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        container.innerHTML = '目前尚無留言。';
        return;
      }
      rawMessages = (data.message ? [data] : Object.values(data)).filter(m => m && m.message);
      
      applyFilters(); 
      displayRandom(); 
    });

    // --- 隨機選取（加入摺疊功能） ---
    function displayRandom() {
      randomContainer.innerHTML = '';
      const shuffled = [...rawMessages].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 10);

      selected.forEach((item, idx) => {
        // 第二個參數設為 true，啟動摺疊
        const div = createMessageCard(item, true, 'rand-' + idx); 
        randomContainer.appendChild(div);
      });
    }

    // --- 搜尋與排序核心邏輯 ---
    function applyFilters() {
      const keyword = searchInput.value.toLowerCase();
      
      // 先篩選搜尋關鍵字
      let result = rawMessages.filter(item => 
        item.message.toLowerCase().includes(keyword)
      );

      // 排序邏輯：Firebase 匯入通常是按順序的(舊→新)
      // 如果要「新到舊」(Descending)，就反轉陣列
      if (isDescending) {
        result = [...result].reverse();
      }

      filteredMessages = result;
      renderPage(1);
    }

    function renderPage(page) {
      container.innerHTML = '';
      const start = (page - 1) * itemsPerPage;
      const pagedData = filteredMessages.slice(start, start + itemsPerPage);

      if (pagedData.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">找不到符合搜尋條件的留言。</p>';
        paginationBox.innerHTML = '';
        return;
      }

      pagedData.forEach((item, idx) => {
        container.appendChild(createMessageCard(item, true, 'all-' + idx));
      });

      renderPagination(page);
    }

    // --- 通用留言卡片建立函數 ---
    function createMessageCard(item, allowFold, uniqueId) {
      const card = document.createElement('div');
      card.className = 'message-card';
      
      const isLong = allowFold && item.message.length > charLimit;
      const shortText = isLong ? item.message.substring(0, charLimit) + "..." : item.message;

      card.innerHTML = `
        <div class="nickname">${item.nickname || '匿名'}</div>
        <div class="content" id="text-${uniqueId}">${shortText}</div>
        ${isLong ? `<button class="toggle-btn" id="btn-${uniqueId}">顯示更多</button>` : ''}
      `;

      if (isLong) {
        // 使用延遲綁定確保元素已存在於 DOM
        setTimeout(() => {
          const btn = document.getElementById(`btn-${uniqueId}`);
          const contentDiv = document.getElementById(`text-${uniqueId}`);
          let expanded = false;
          if (btn) {
            btn.onclick = () => {
              expanded = !expanded;
              contentDiv.innerText = expanded ? item.message : shortText;
              btn.innerText = expanded ? '收起' : '顯示更多';
            };
          }
        }, 0);
      }
      return card;
    }

    function renderPagination(current) {
      paginationBox.innerHTML = '';
      const totalPages = Math.ceil(filteredMessages.length / itemsPerPage);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => {
          renderPage(i);
          window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
        };
        paginationBox.appendChild(btn);
      }
    }

    // --- 監聽事件 ---
    searchInput.oninput = () => applyFilters();
    
    sortBtn.onclick = () => {
      isDescending = !isDescending;
      sortBtn.innerText = isDescending ? '切換排序：目前為 倒序 (新→舊)' : '切換排序：目前為 正序 (舊→新)';
      applyFilters();
    };

    refreshRandomBtn.onclick = () => {
      displayRandom();
      // 點擊隨機時，不影響下方的存檔區，但給個回饋
      refreshRandomBtn.style.opacity = '0.7';
      setTimeout(() => refreshRandomBtn.style.opacity = '1', 100);
    };
  </script>
</body>
</html>
