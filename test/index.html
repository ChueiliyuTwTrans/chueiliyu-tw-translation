<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">留言讀取中...</p>
  </div>

  <script>
  // 將功能封裝成一個函數
  function initGuestbook() {
    const container = document.getElementById('guestbook-container');
    
    // 檢查 Firebase 全域變數是否存在
    if (!window.db || !window.fb_ref) {
      console.warn("⚠️ Firebase 尚未準備好，0.5秒後重試...");
      setTimeout(initGuestbook, 500); // 如果還沒好，半秒後再跑一次
      return;
    }

    console.log("🚀 開始連接資料庫路徑: 'test'");
    const testRef = window.fb_ref(window.db, 'test');

    window.fb_onValue(testRef, (snapshot) => {
      const data = snapshot.val();
      console.log("📥 資料接收成功:", data);

      if (!container) return;
      container.innerHTML = '';

      if (!data) {
        container.innerHTML = '<p>資料庫目前是空的 (null)。</p>';
        return;
      }

      // 結構相容處理
      let messages = [];
      if (data.message) {
        messages = [data]; // 單筆格式
      } else {
        messages = Object.values(data); // 多筆格式
      }

      messages.forEach(item => {
        if (item.message) {
          const messageBox = document.createElement('div');
          messageBox.style.cssText = `
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            border-left: 4px solid #60a5fa;
            text-align: left;
          `;
          messageBox.innerHTML = `
            <div style="font-weight: bold; font-size: 0.85em; color: #555;">${item.nickname || '匿名'}</div>
            <div style="margin-top: 4px; color: #111;">${item.message}</div>
          `;
          container.prepend(messageBox);
        }
      });
    }, (error) => {
      console.error("❌ 讀取發生錯誤:", error);
      if(container) container.innerHTML = `<p>讀取出錯: ${error.message}</p>`;
    });
  }

  // 直接執行，不等待 load 事件 (因為你的 Firebase script 可能已經跑完了)
  initGuestbook();
</script>
</html>
