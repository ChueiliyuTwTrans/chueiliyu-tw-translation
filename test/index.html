<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://chueiliyutwtrans.github.io/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://chueiliyutwtrans.github.io/favicon.png">
  <title>測試</title>

  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
    
    /* 區塊容器 */
    .section-title { font-size: 1.2em; font-weight: bold; margin: 20px 0 10px; color: #1e40af; border-left: 5px solid #60a5fa; padding-left: 10px; }
    
    /* 搜尋與控制區 */
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .search-input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; }
    .sort-btn, .random-btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; background: #60a5fa; color: white; transition: 0.3s; }
    .sort-btn:hover, .random-btn:hover { background: #3b82f6; }

    /* 隨機區塊樣式 */
    #random-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 30px; background: #e0f2fe; padding: 15px; border-radius: 12px; }

    /* 留言框樣式 */
    .message-card { padding: 15px; background: white; border-radius: 10px; border-left: 4px solid #60a5fa; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
    .nickname { font-weight: bold; color: #555; font-size: 0.9em; margin-bottom: 5px; }
    .content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .toggle-btn { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 12px; display: block; margin-top: 5px; margin-left: auto; }

    /* 分頁樣式 */
    .pagination { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 20px; justify-content: center; }
    .page-btn { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
    .page-btn.active { background: #60a5fa; color: white; border-color: #60a5fa; }
  </style>
</head>

<body>

  <div class="section-title">✨ 隨機精選留言 (10則) <button class="random-btn" id="refresh-random" style="font-size: 12px; margin-left: 10px;">再次隨機抽選留言</button></div>
  <div id="random-container">
    <p>隨機挑選中...</p>
  </div>

  <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 30px 0;">

  <div class="section-title">顯示全部留言</div>
  <div class="controls">
    <input type="text" id="search-input" class="search-input" placeholder="搜尋留言內容...">
    <button id="sort-btn" class="sort-btn">切換為：正序 (舊→新)</button>
  </div>

  <div id="guestbook-container" style="display: flex; flex-direction: column; gap: 15px;">
    <p id="loading-text">資料載入中...</p>
  </div>

  <div id="pagination-controls" class="pagination"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8JlcBK_edVc2HkK9edJtYwNSYspreVyw",
      authDomain: "chueiliyu-tw-translation.firebaseapp.com",
      databaseURL: "https://chueiliyu-tw-translation-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chueiliyu-tw-translation",
      storageBucket: "chueiliyu-tw-translation.appspot.com",
      messagingSenderId: "625769420546",
      appId: "1:625769420546:web:6d25889d1c66a091fe941b", 
      measurementId: "G-3PM3GTXPHF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // 全域變數
    let rawMessages = []; // 原始資料
    let filteredMessages = []; // 搜尋或排序後的資料
    let isDescending = true; // 預設倒序 (新到舊)
    const itemsPerPage = 100;
    const charLimit = 100;

    // DOM 元素
    const container = document.getElementById('guestbook-container');
    const randomContainer = document.getElementById('random-container');
    const paginationBox = document.getElementById('pagination-controls');
    const searchInput = document.getElementById('search-input');
    const sortBtn = document.getElementById('sort-btn');
    const refreshRandomBtn = document.getElementById('refresh-random');

    // 監聽 Firebase
    onValue(ref(db, 'test'), (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        container.innerHTML = '目前尚無留言。';
        return;
      }
      
      // 處理資料：轉為陣列並過濾無效內容
      rawMessages = (data.message ? [data] : Object.values(data)).filter(m => m && m.message);
      
      applyFilters(); // 初次執行排序與顯示
      displayRandom(); // 執行隨機選取
    });

    // --- 隨機選取邏輯 ---
    function displayRandom() {
      randomContainer.innerHTML = '';
      const shuffled = [...rawMessages].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 10);

      selected.forEach(item => {
        const div = createMessageCard(item, false); // 隨機區不顯示摺疊
        randomContainer.appendChild(div);
      });
    }

    // --- 搜尋與排序處理 ---
    function applyFilters() {
      const keyword = searchInput.value.toLowerCase();
      
      // 1. 搜尋篩選
      filteredMessages = rawMessages.filter(item => 
        item.message.toLowerCase().includes(keyword)
      );

      // 2. 排序處理
      if (isDescending) {
        filteredMessages.reverse(); // 假設原始資料是舊到新，reverse 變新到舊
      }

      renderPage(1);
    }

    // --- 渲染分頁功能 ---
    function renderPage(page) {
      container.innerHTML = '';
      const start = (page - 1) * itemsPerPage;
      const pagedData = filteredMessages.slice(start, start + itemsPerPage);

      if (pagedData.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px;">找不到符合搜尋條件的留言。</p>';
        paginationBox.innerHTML = '';
        return;
      }

      pagedData.forEach((item, idx) => {
        container.appendChild(createMessageCard(item, true, idx));
      });

      renderPagination(page);
    }

    // --- 建立留言卡片組件 ---
    function createMessageCard(item, allowFold, idSuffix = '') {
      const card = document.createElement('div');
      card.className = 'message-card';
      
      const isLong = allowFold && item.message.length > charLimit;
      const shortText = isLong ? item.message.substring(0, charLimit) + "..." : item.message;

      card.innerHTML = `
        <div class="nickname">${item.nickname || '匿名'}</div>
        <div class="content">${shortText}</div>
        ${isLong ? `<button class="toggle-btn">顯示更多</button>` : ''}
      `;

      if (isLong) {
        const btn = card.querySelector('.toggle-btn');
        const contentDiv = card.querySelector('.content');
        let expanded = false;
        btn.onclick = () => {
          expanded = !expanded;
          contentDiv.innerText = expanded ? item.message : shortText;
          btn.innerText = expanded ? '收起' : '顯示更多';
        };
      }
      return card;
    }

    // --- 分頁按鈕 ---
    function renderPagination(current) {
      paginationBox.innerHTML = '';
      const totalPages = Math.ceil(filteredMessages.length / itemsPerPage);
      if (totalPages <= 1) return;

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.onclick = () => {
          renderPage(i);
          window.scrollTo({ top: container.offsetTop - 50, behavior: 'smooth' });
        };
        paginationBox.appendChild(btn);
      }
    }

    // --- 事件監聽 ---
    searchInput.oninput = () => applyFilters();
    
    sortBtn.onclick = () => {
      isDescending = !isDescending;
      sortBtn.innerText = isDescending ? '切換為：正序 (舊→新)' : '切換為：倒序 (新→舊)';
      applyFilters();
    };

    refreshRandomBtn.onclick = () => displayRandom();

  </script>
</body>
</html>
